# ─── Nord palette + styles (read from oh-my-posh theme) ─────────
run-shell 'eval "$(jq -r ".palette | to_entries[] | \"\\(.key | ascii_upcase)=\\(.value)\"" ~/.dotfiles/oh-my-posh/theme.omp.json)" && \
  tmux set -g pane-border-style        "fg=$NORD8" && \
  tmux set -g pane-active-border-style "fg=$NORD8" && \
  tmux set -g message-style            "bg=$NORD1,fg=$NORD4" && \
  tmux set -g mode-style               "bg=$NORD2,fg=$NORD4" && \
  tmux set -g display-panes-colour     "$NORD3" && \
  tmux set -g display-panes-active-colour "$NORD8"'

# ─── Prefix ────────────────────────────────────────────────────
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# ─── General ───────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g set-titles on
set -g status-keys vi
set -g history-limit 50000
setw -g mode-keys vi
set -g mouse on
setw -g monitor-activity off
set -sg escape-time 0
set -g focus-events on
set -g renumber-windows on
set -g detach-on-destroy off

# ─── Terminal & clipboard ──────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -s set-clipboard on
set -g allow-passthrough on

# ─── Splits & navigation ──────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane selection (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt-vim keys without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt-arrow keys without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift-arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# ─── Resize panes ─────────────────────────────────────────────
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

# ─── Copy mode ─────────────────────────────────────────────────
bind-key / copy-mode \; send-key ?
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

# ─── Session switcher (fzf) ───────────────────────────────────
set -g @fzf-goto-session 's'
set -g @fzf-goto-win-width 80
set -g @fzf-goto-win-height 20

# ─── Session management ────────────────────────────────────────
# New session named after current directory
bind C new-session -s "#{b:pane_current_path}" -c "#{pane_current_path}"
# Kill session and switch to next (instead of detaching)
bind X confirm-before -p "Kill session #S? (y/n)" "run-shell 'tmux switch-client -n \\; kill-session -t \"#S\"'"

# ─── Scratch popup ─────────────────────────────────────────────
bind g display-popup -d "#{pane_current_path}" -w 80% -h 80%

# ─── Reload config ─────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display 'Reloaded tmux config'

# ─── Status bar ────────────────────────────────────────────────
set -g status-right-length 200

# ─── Session persistence ──────────────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# ─── Window naming ─────────────────────────────────────────────
set -g @tmux_window_name_use_tilde "True"
set -g @tmux_window_name_max_name_len "20"
set -g @tmux_window_name_show_program_args "False"
set -g @tmux_window_name_dir_programs "[]"
run-shell 'tmux set -g @tmux_window_name_substitute_sets "[(\"^[0-9]+\\\\.[0-9]+\\\\.[0-9]+$\", \"claude\"), (\"(.*)/([^/]+)$\", \"\\g<2>\")]"'

# ─── Plugins ───────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'erikw/tmux-powerline'
set -g @plugin 'NHDaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'thuanOwa/tmux-fzf-session-switch'

# ─── TPM init (keep at bottom) ─────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

# ─── Post-plugin overrides (must come after TPM) ──────────────
run-shell 'DEFAULT=$(tmux show -gv "status-format[0]") && \
  tmux set -g "status-format[0]" "#[fg=#88C0D0,bg=#2E3440,fill=#2E3440]────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────" && \
  tmux set -g "status-format[1]" "$DEFAULT" && \
  tmux set -g status 2'
